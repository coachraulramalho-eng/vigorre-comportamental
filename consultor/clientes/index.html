<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes | VIGORRE ONE™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <style>
        /* CSS simplificado para página de clientes */
        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFC;
            color: #0F172A;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #E2E8F0;
        }
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0A2540;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94A3B8;
            margin-bottom: 24px;
        }
        .btn-back {
            display: inline-block;
            padding: 8px 20px;
            background: #1D4ED8;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: #1A3A5C;
            transform: translateY(-2px);
        }
        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
        }
        .placeholder .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background: #0F172A;
            }
            .container {
                background: #1E293B;
                border-color: #334155;
            }
            h1 {
                color: #F8FAFC;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../dashboard.html" class="btn-back">← Voltar ao Dashboard</a>
        <h1>👥 Meus Clientes</h1>
        <p class="subtitle">Lista de clientes gerenciados por você</p>
        <div class="placeholder">
            <span class="icon">📋</span>
            <h3>Nenhum cliente cadastrado ainda</h3>
            <p>Os clientes aparecerão aqui após serem adicionados.</p>
        </div>
    </div>
    <script src="../../auth.js"></script>
    <script>
        // Verificação de autenticação
        if (window.VigorreAuth && !window.VigorreAuth.isAuthenticated()) {
            window.location.href = '../../login.html';
        }
    </script>
</body>
</html>
