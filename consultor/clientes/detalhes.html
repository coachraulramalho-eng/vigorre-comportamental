<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhes do Cliente | VIGORRE ONE™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <style>
        :root{--navy:#0A2540;--gold:#D97706;--gold-light:#F59E0B;--green:#10B981;--red:#EF4444;--blue:#3B82F6;--gray-50:#F8FAFC;--gray-200:#E2E8F0;--gray-400:#94A3B8;--gray-600:#475569;--gray-800:#1E293B;--gray-900:#0F172A;--white:#FFFFFF;--radius:16px;--radius-sm:10px;--font-primary:'Inter',sans-serif;--font-display:'Poppins',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-primary);background:var(--gray-50);color:var(--gray-600);min-height:100vh;padding:40px;display:flex;justify-content:center;align-items:flex-start}
        .container{max-width:1000px;width:100%;background:var(--white);border-radius:var(--radius);padding:40px;box-shadow:0 4px 24px rgba(0,0,0,0.04);border:1px solid var(--gray-200)}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
        .header h1{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--navy)}
        .header h1 .highlight{color:var(--gold)}
        .btn-back{padding:8px 20px;background:var(--navy);color:white;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:0.85rem;transition:0.3s}
        .btn-back:hover{background:var(--gold);transform:translateY(-2px)}
        .btn-primary{padding:8px 20px;background:var(--gold);color:white;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:0.85rem;transition:0.3s;border:none;cursor:pointer}
        .btn-primary:hover{background:var(--navy);transform:translateY(-2px)}
        .btn-outline{padding:8px 20px;background:transparent;color:var(--navy);border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:0.85rem;transition:0.3s;cursor:pointer}
        .btn-outline:hover{background:var(--gray-50);transform:translateY(-2px)}
        .subtitle{color:var(--gray-400);margin-bottom:24px;font-size:0.9rem}
        .profile-card{display:flex;gap:24px;padding:24px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200);margin-bottom:24px;flex-wrap:wrap}
        .profile-card .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:2.4rem;color:white;flex-shrink:0}
        .profile-card .info{flex:1}
        .profile-card .info .name{font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--navy)}
        .profile-card .info .company{color:var(--gray-400);font-size:0.9rem}
        .profile-card .info .status{margin-top:8px;display:inline-block;padding:4px 14px;border-radius:var(--radius-full);font-size:0.75rem;font-weight:600}
        .profile-card .info .status.completed{background:rgba(16,185,129,0.12);color:var(--green)}
        .profile-card .info .status.pending{background:rgba(245,158,11,0.12);color:#F59E0B}
        .profile-card .info .status.in_progress{background:rgba(59,130,246,0.12);color:var(--blue)}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
        .stat-item{background:var(--gray-50);padding:16px;border-radius:var(--radius-sm);text-align:center;border:1px solid var(--gray-200)}
        .stat-item .value{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--navy)}
        .stat-item .label{font-size:0.65rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.05em}
        .section-title{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--navy);margin:24px 0 12px}
        .report-list{display:grid;gap:12px}
        .report-item{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200);transition:0.3s}
        .report-item:hover{border-color:var(--gold)}
        .report-item .left{display:flex;align-items:center;gap:12px}
        .report-item .left .icon{font-size:1.4rem}
        .report-item .left .info .title{font-weight:600;color:var(--navy);font-size:0.9rem}
        .report-item .left .info .date{font-size:0.7rem;color:var(--gray-400)}
        .report-item .right{display:flex;gap:8px}
        .report-item .right .badge{display:inline-block;padding:2px 12px;border-radius:var(--radius-full);font-size:0.6rem;font-weight:600}
        .report-item .right .badge.generated{background:rgba(16,185,129,0.12);color:var(--green)}
        .report-item .right .badge.pending{background:rgba(245,158,11,0.12);color:#F59E0B}
        .btn-sm{padding:4px 14px;font-size:0.7rem;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:0.3s;text-decoration:none;display:inline-block}
        .btn-sm-gold{background:var(--gold);color:white}
        .btn-sm-gold:hover{background:var(--navy);transform:translateY(-1px)}
        .btn-sm-outline{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200)}
        .btn-sm-outline:hover{background:var(--gray-50)}
        .empty-state{text-align:center;padding:40px 20px;color:var(--gray-400)}
        .empty-state .icon{font-size:3rem;display:block;margin-bottom:12px}
        .footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--gray-200);text-align:center;font-size:0.7rem;color:var(--gray-400)}
        @media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr}.profile-card{flex-direction:column;align-items:center;text-align:center}}
        @media(prefers-color-scheme:dark){body{background:var(--gray-900)}.container{background:var(--gray-800);border-color:var(--gray-700)}.header h1{color:var(--white)}.profile-card{background:var(--gray-900);border-color:var(--gray-700)}.profile-card .info .name{color:var(--white)}.stat-item{background:var(--gray-900);border-color:var(--gray-700)}.stat-item .value{color:var(--white)}.section-title{color:var(--white)}.report-item{background:var(--gray-900);border-color:var(--gray-700)}.report-item .left .info .title{color:var(--white)}.empty-state{color:var(--gray-500)}.footer{border-color:var(--gray-700)}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 <span class="highlight">Detalhes do Cliente</span></h1>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <a href="javascript:history.back()" class="btn-back">← Voltar</a>
                <a href="gerar-relatorio.html" class="btn-primary">📄 Gerar Relatório</a>
            </div>
        </div>

        <!-- ===== PERFIL ===== -->
        <div class="profile-card" id="profileCard">
            <div class="avatar" id="avatar">👤</div>
            <div class="info">
                <div class="name" id="clientName">Carregando...</div>
                <div class="company" id="clientCompany">-</div>
                <div>
                    <span class="status pending" id="clientStatus">⏳ Pendente</span>
                </div>
            </div>
        </div>

        <!-- ===== STATS ===== -->
        <div class="stats-row">
            <div class="stat-item"><div class="value" id="totalReports">0</div><div class="label">Relatórios</div></div>
            <div class="stat-item"><div class="value" id="totalTests">0</div><div class="label">Testes</div></div>
            <div class="stat-item"><div class="value" id="totalCredits">0</div><div class="label">Créditos Usados</div></div>
            <div class="stat-item"><div class="value" id="lastActivity">-</div><div class="label">Última Atividade</div></div>
        </div>

        <!-- ===== RELATÓRIOS ===== -->
        <div class="section-title">📋 Relatórios Gerados</div>
        <div class="report-list" id="reportList">
            <div class="empty-state"><span class="icon">📄</span><p>Nenhum relatório gerado ainda</p></div>
        </div>

        <!-- ===== HISTÓRICO DE CRÉDITOS ===== -->
        <div class="section-title">💳 Histórico de Créditos</div>
        <div class="report-list" id="creditHistory">
            <div class="empty-state"><span class="icon">💳</span><p>Nenhuma transação registrada</p></div>
        </div>

        <div class="footer">© 2026 VIGORRE ONE™ · People Analytics Enterprise</div>
    </div>

    <script src="../../supabase-config.js"></script>
    <script src="../../auth.js"></script>
    <script>
        'use strict';

        var participantId = null;

        document.addEventListener('DOMContentLoaded', function() {
            if (window.VigorreAuth && !window.VigorreAuth.isAuthenticated()) {
                window.location.href = '../../login.html';
                return;
            }

            var user = window.VigorreAuth.getCurrentUser();
            if (!user || user.role !== 'consultant') {
                alert('⚠️ Acesso restrito a consultores.');
                window.location.href = '../../login.html';
                return;
            }

            // Pegar ID da URL
            var params = new URLSearchParams(window.location.search);
            participantId = params.get('id');

            if (participantId) {
                carregarDados(participantId);
            } else {
                // Fallback: dados mockados
                document.getElementById('clientName').textContent = 'João Silva';
                document.getElementById('clientCompany').textContent = 'TechCorp Solutions';
                document.getElementById('clientStatus').textContent = '⏳ Pendente';
                document.getElementById('clientStatus').className = 'status pending';
            }
        });

        function carregarDados(id) {
            try {
                var participants = JSON.parse(localStorage.getItem('vigorre_participants') || '[]');
                var reports = JSON.parse(localStorage.getItem('vigorre_reports') || '[]');
                var transactions = JSON.parse(localStorage.getItem('vigorre_credit_transactions') || '[]');

                var participant = null;
                for (var i = 0; i < participants.length; i++) {
                    if (participants[i].id === id) {
                        participant = participants[i];
                        break;
                    }
                }

                if (!participant) {
                    document.getElementById('clientName').textContent = 'Participante não encontrado';
                    return;
                }

                // Perfil
                document.getElementById('clientName').textContent = participant.name || 'Sem nome';
                document.getElementById('clientCompany').textContent = participant.companyName || 'Autônomo';
                
                var statusMap = { 'completed': '✅ Concluído', 'in_progress': '🔄 Em andamento', 'pending': '⏳ Pendente' };
                var statusClassMap = { 'completed': 'completed', 'in_progress': 'in_progress', 'pending': 'pending' };
                document.getElementById('clientStatus').textContent = statusMap[participant.status] || '⏳ Pendente';
                document.getElementById('clientStatus').className = 'status ' + (statusClassMap[participant.status] || 'pending');

                // Stats
                var participantReports = [];
                for (var j = 0; j < reports.length; j++) {
                    if (reports[j].participantId === id) {
                        participantReports.push(reports[j]);
                    }
                }

                document.getElementById('totalReports').textContent = participantReports.length;
                document.getElementById('totalTests').textContent = (participant.tests || []).length;
                
                // Créditos usados
                var creditsUsed = 0;
                for (var k = 0; k < transactions.length; k++) {
                    if (transactions[k].participantId === id && transactions[k].type === 'debito') {
                        var creds = transactions[k].credits || {};
                        for (var key in creds) {
                            creditsUsed += creds[key];
                        }
                    }
                }
                document.getElementById('totalCredits').textContent = creditsUsed;
                document.getElementById('lastActivity').textContent = participant.updatedAt ? new Date(participant.updatedAt).toLocaleDateString('pt-BR') : '-';

                // Relatórios
                var reportList = document.getElementById('reportList');
                if (participantReports.length === 0) {
                    reportList.innerHTML = '<div class="empty-state"><span class="icon">📄</span><p>Nenhum relatório gerado ainda</p></div>';
                } else {
                    var html = '';
                    for (var l = 0; l < participantReports.length; l++) {
                        var r = participantReports[l];
                        html += '<div class="report-item">';
                        html += '<div class="left"><span class="icon">📄</span>';
                        html += '<div class="info"><div class="title">Relatório ' + r.type + '</div>';
                        html += '<div class="date">' + new Date(r.generatedAt).toLocaleDateString('pt-BR') + '</div></div></div>';
                        html += '<div class="right"><span class="badge generated">✅ Gerado</span>';
                        html += '<a href="#" class="btn-sm btn-sm-outline" onclick="showToast(\'📄 Download em breve\', \'info\')">📥</a></div>';
                        html += '</div>';
                    }
                    reportList.innerHTML = html;
                }

                // Histórico de créditos
                var creditHistory = document.getElementById('creditHistory');
                var participantTransactions = [];
                for (var m = 0; m < transactions.length; m++) {
                    if (transactions[m].participantId === id) {
                        participantTransactions.push(transactions[m]);
                    }
                }

                if (participantTransactions.length === 0) {
                    creditHistory.innerHTML = '<div class="empty-state"><span class="icon">💳</span><p>Nenhuma transação registrada</p></div>';
                } else {
                    var html2 = '';
                    for (var n = 0; n < participantTransactions.length; n++) {
                        var t = participantTransactions[n];
                        var typeIcon = t.type === 'debito' ? '🔴' : '🟢';
                        var typeLabel = t.type === 'debito' ? 'Crédito consumido' : 'Crédito adicionado';
                        var credsStr = '';
                        var creds = t.credits || {};
                        for (var key2 in creds) {
                            credsStr += key2 + ': ' + creds[key2] + ' ';
                        }
                        html2 += '<div class="report-item">';
                        html2 += '<div class="left"><span class="icon">' + typeIcon + '</span>';
                        html2 += '<div class="info"><div class="title">' + typeLabel + ' - ' + t.reportType + '</div>';
                        html2 += '<div class="date">' + new Date(t.date).toLocaleDateString('pt-BR') + ' • ' + credsStr + '</div></div></div>';
                        html2 += '</div>';
                    }
                    creditHistory.innerHTML = html2;
                }

            } catch (error) {
                console.error('❌ Erro ao carregar dados:', error);
            }
        }

        function showToast(message, type) {
            alert(message);
        }
    </script>
</body>
</html>
