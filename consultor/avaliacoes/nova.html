<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Avaliação | VIGORRE ONE™</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />

    <style>
        :root {
            --navy: #0A2540;
            --gold: #D97706;
            --gray-50: #F8FAFC;
            --gray-200: #E2E8F0;
            --gray-400: #94A3B8;
            --gray-600: #475569;
            --gray-800: #1E293B;
            --gray-900: #0F172A;
            --white: #FFFFFF;
            --radius: 16px;
            --radius-sm: 10px;
            --font-primary: 'Inter', sans-serif;
            --font-display: 'Poppins', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--gray-50);
            color: var(--gray-600);
            min-height: 100vh;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--white);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--gray-200);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--navy);
        }
        .header h1 .highlight { color: var(--gold); }
        .btn-back {
            padding: 8px 20px;
            background: var(--navy);
            color: white;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .btn-back:hover { background: var(--gold); transform: translateY(-2px); }
        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }
        .placeholder .icon { font-size: 4rem; display: block; margin-bottom: 16px; }
        .placeholder h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--gray-600); margin-bottom: 8px; }
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-200);
            text-align: center;
            font-size: 0.7rem;
            color: var(--gray-400);
        }
        @media (prefers-color-scheme: dark) {
            body { background: var(--gray-900); }
            .container { background: var(--gray-800); border-color: var(--gray-700); }
            .header h1 { color: var(--white); }
            .placeholder h3 { color: var(--gray-300); }
            .footer { border-color: var(--gray-700); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 <span class="highlight">Nova Avaliação</span></h1>
            <a href="index.html" class="btn-back">← Voltar</a>
        </div>
        <div class="placeholder">
            <span class="icon">📝</span>
            <h3>Selecione o tipo de avaliação</h3>
            <p>Em breve você poderá iniciar novas avaliações aqui.</p>
        </div>
        <div class="footer">© 2026 VIGORRE ONE™ · People Analytics Enterprise</div>
    </div>
    <script src="../../auth.js"></script>
    <script>
        if (window.VigorreAuth && !window.VigorreAuth.isAuthenticated()) {
            window.location.href = '../../login.html';
        }
    </script>
</body>
</html>
