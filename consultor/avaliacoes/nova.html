<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Avaliação | VIGORRE ONE™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <style>
        :root{--navy:#0A2540;--gold:#D97706;--gray-50:#F8FAFC;--gray-200:#E2E8F0;--gray-400:#94A3B8;--gray-600:#475569;--gray-800:#1E293B;--gray-900:#0F172A;--white:#FFFFFF;--radius:16px;--radius-sm:10px;--font-primary:'Inter',sans-serif;--font-display:'Poppins',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-primary);background:var(--gray-50);color:var(--gray-600);min-height:100vh;padding:40px;display:flex;justify-content:center;align-items:flex-start}
        .container{max-width:800px;width:100%;background:var(--white);border-radius:var(--radius);padding:40px;box-shadow:0 4px 24px rgba(0,0,0,0.04);border:1px solid var(--gray-200)}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
        .header h1{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--navy)}
        .header h1 .highlight{color:var(--gold)}
        .btn-back{padding:8px 20px;background:var(--navy);color:white;border-radius:var(--radius-sm);text-decoration:none;font-weight:600;font-size:0.85rem;transition:0.3s}
        .btn-back:hover{background:var(--gold);transform:translateY(-2px)}
        .subtitle{color:var(--gray-400);margin-bottom:20px;font-size:0.9rem}
        .testes-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .teste-card{padding:24px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200);text-align:center;cursor:pointer;transition:0.3s}
        .teste-card:hover{border-color:var(--gold);transform:translateY(-2px)}
        .teste-card .icon{font-size:2.4rem;display:block;margin-bottom:8px}
        .teste-card h4{font-family:var(--font-display);font-size:1rem;color:var(--navy)}
        .teste-card p{font-size:0.75rem;color:var(--gray-400)}
        .teste-card .credits{font-size:0.7rem;color:var(--gray-400);margin-top:8px}
        .btn-start{width:100%;padding:14px;margin-top:24px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:white;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:600;cursor:pointer;transition:0.3s}
        .btn-start:hover{transform:translateY(-2px)}
        .btn-start:disabled{opacity:0.5;cursor:not-allowed}
        .footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--gray-200);text-align:center;font-size:0.7rem;color:var(--gray-400)}
        @media(max-width:768px){.testes-grid{grid-template-columns:1fr}}
        @media(prefers-color-scheme:dark){body{background:var(--gray-900)}.container{background:var(--gray-800);border-color:var(--gray-700)}.header h1{color:var(--white)}.teste-card{background:var(--gray-900);border-color:var(--gray-700)}.teste-card h4{color:var(--white)}.footer{border-color:var(--gray-700)}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 <span class="highlight">Nova Avaliação</span></h1>
            <a href="index.html" class="btn-back">← Voltar</a>
        </div>
        <p class="subtitle">Selecione o tipo de avaliação para iniciar</p>
        <div class="testes-grid">
            <div class="teste-card" onclick="selecionarTeste('DISC')">
                <span class="icon">📊</span><h4>DISC</h4><p>Avaliação comportamental</p><span class="credits">1 crédito</span>
            </div>
            <div class="teste-card" onclick="selecionarTeste('IE')">
                <span class="icon">🧠</span><h4>Inteligência Emocional</h4><p>IE 360°</p><span class="credits">1 crédito</span>
            </div>
            <div class="teste-card" onclick="selecionarTeste('VALORES')">
                <span class="icon">💎</span><h4>Valores</h4><p>Avaliação de valores</p><span class="credits">1 crédito</span>
            </div>
            <div class="teste-card" onclick="selecionarTeste('BIGFIVE')">
                <span class="icon">🧬</span><h4>Big Five</h4><p>Personalidade</p><span class="credits">1 crédito</span>
            </div>
        </div>
        <button class="btn-start" id="btnStart" disabled>🔒 Selecione um teste</button>
        <div class="footer">© 2026 VIGORRE ONE™ · People Analytics Enterprise</div>
    </div>
    <script src="../../auth.js"></script>
    <script>
        var testeSelecionado = null;
        function selecionarTeste(tipo) {
            testeSelecionado = tipo;
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStart').textContent = '🚀 Iniciar ' + tipo;
            document.querySelectorAll('.teste-card').forEach(el => el.style.borderColor = 'var(--gray-200)');
            event.currentTarget.style.borderColor = 'var(--gold)';
        }
        document.getElementById('btnStart').addEventListener('click', function() {
            if (testeSelecionado) {
                window.location.href = 'realizar.html?tipo=' + testeSelecionado;
            }
        });
        if (window.VigorreAuth && !window.VigorreAuth.isAuthenticated()) {
            window.location.href = '../../login.html';
        }
    </script>
</body>
</html>
