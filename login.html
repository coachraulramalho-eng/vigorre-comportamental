<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | VIGORRE ONE™</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0A2540,#1A3A5C);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
        .logo{text-align:center;margin-bottom:32px}
        .logo img{height:48px;margin-bottom:8px}
        .logo h1{font-family:'Poppins',sans-serif;font-size:1.2rem;font-weight:800;color:#0A2540}
        .logo p{font-size:0.7rem;color:#94A3B8;letter-spacing:0.05em;text-transform:uppercase}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:0.75rem;font-weight:600;color:#475569;margin-bottom:4px}
        .form-group input{width:100%;padding:12px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:0.9rem;transition:all .25s;background:#F8FAFC}
        .form-group input:focus{outline:none;border-color:#1D4ED8;background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,0.08)}
        .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all .25s;margin-top:8px}
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(29,78,216,0.25)}
        .btn-login:active{transform:translateY(0)}
        .error-message{display:none;padding:10px 14px;border-radius:8px;font-size:0.85rem;font-weight:500;margin-top:12px;background:#FEF2F2;color:#EF4444;border:1px solid #FECACA}
        .footer{display:flex;justify-content:center;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid #E2E8F0;font-size:0.65rem;color:#94A3B8}
        @media(max-width:480px){.login-card{padding:28px 20px}}
        @media(prefers-color-scheme:dark){.login-card{background:#1E293B}.logo h1{color:#F8FAFC}.form-group label{color:#94A3B8}.form-group input{background:#0F172A;border-color:#334155;color:#F8FAFC}.form-group input:focus{background:#1E293B;border-color:#3B82F6}.footer{border-color:#334155;color:#64748B}}
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <img src="/assets/images/logo-vigorre.png" alt="VIGORRE ONE™" />
        <h1>VIGORRE ONE™</h1>
        <p>People Analytics Enterprise</p>
    </div>

    <form id="loginForm" autocomplete="off">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="off" required />
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly')" required />
        </div>
        <button type="submit" class="btn-login">🔐 Entrar</button>
        <div id="loginError" class="error-message"></div>
    </form>

    <div class="footer">
        <span>🔒 Sessão segura</span>
        <span>|</span>
        <span>© 2026 VIGORRE ONE™</span>
    </div>
</div>

<script src="/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (window.VigorreAuth && window.VigorreAuth.isAuthenticated()) {
        var user = window.VigorreAuth.getCurrentUser();
        if (user) {
            window.location.href = window.VigorreAuth.getRedirectUrl(user.role);
            return;
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value.trim();
        var errorEl = document.getElementById('loginError');
        errorEl.style.display = 'none';

        if (!email || !password) {
            errorEl.textContent = '❌ Preencha todos os campos';
            errorEl.style.display = 'block';
            return;
        }

        var result = window.VigorreAuth.login(email, password);
        if (result.success) {
            errorEl.style.background = '#ECFDF5';
            errorEl.style.color = '#10B981';
            errorEl.style.borderColor = '#A7F3D0';
            errorEl.textContent = '✅ ' + result.message;
            errorEl.style.display = 'block';
            setTimeout(function() {
                window.location.href = result.redirect || '/dashboard.html';
            }, 600);
        } else {
            errorEl.style.background = '#FEF2F2';
            errorEl.style.color = '#EF4444';
            errorEl.style.borderColor = '#FECACA';
            errorEl.textContent = result.message;
            errorEl.style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('password').setAttribute('readonly', 'readonly');
        }
    });
});

// Bloquear tecla Enter
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.closest('form')) {
        e.preventDefault();
        e.target.closest('form').dispatchEvent(new Event('submit'));
    }
});
</script>
</body>
</html>
