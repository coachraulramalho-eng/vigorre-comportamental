<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | VIGORRE ONE™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --navy: #0A2540;
            --gold: #D97706;
            --gold-light: #F59E0B;
            --cyan: #06B6D4;
            --white: #FFFFFF;
            --gray-50: #F8FAFC;
            --gray-200: #E2E8F0;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-700: #334155;
            --gray-800: #1E293B;
            --gray-900: #0F172A;
            --radius: 16px;
            --font-primary: 'Inter', sans-serif;
            --font-display: 'Poppins', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--gray-900);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(217,119,6,0.05) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 50%, rgba(6,182,212,0.03) 0%, transparent 60%);
        }
        .card {
            background: var(--gray-800);
            border-radius: var(--radius);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--gray-700);
            box-shadow: 0 8px 48px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--cyan));
            opacity: 0.6;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo .name {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo .name .one {
            color: var(--gold);
        }
        .logo .name .tm {
            font-size: 0.5rem;
            color: var(--gray-500);
            vertical-align: super;
        }
        .logo .sub {
            font-size: 0.6rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            display: block;
            margin-top: -2px;
        }
        .card h1 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card .desc {
            color: var(--gray-500);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-400);
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--gray-900);
            border: 1px solid var(--gray-700);
            border-radius: 10px;
            color: var(--white);
            font-size: 0.95rem;
            transition: 0.3s;
            font-family: var(--font-primary);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(217,119,6,0.05);
        }
        .form-group select option {
            background: var(--gray-800);
        }
        .lgpd-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 16px 0;
            font-size: 0.75rem;
            color: var(--gray-400);
            line-height: 1.5;
        }
        .lgpd-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--gold);
            cursor: pointer;
            flex-shrink: 0;
        }
        .lgpd-check a {
            color: var(--gold);
            text-decoration: underline;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            font-family: var(--font-primary);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px rgba(217,119,6,0.3);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error {
            color: #EF4444;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .success {
            color: #10B981;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
        .success.show {
            display: block;
        }
        .demo-info {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(217,119,6,0.04);
            border: 1px solid rgba(217,119,6,0.06);
            border-radius: 10px;
            font-size: 0.7rem;
            color: var(--gray-400);
            line-height: 1.6;
        }
        .demo-info strong {
            color: var(--gold);
        }
        .demo-info .code {
            background: var(--gray-900);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--gray-300);
        }
        .footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-700);
            text-align: center;
            font-size: 0.65rem;
            color: var(--gray-500);
        }
        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
            .logo .name { font-size: 1.3rem; }
            .lgpd-check { font-size: 0.7rem; }
        }
        @media (prefers-color-scheme: light) {
            body {
                background: #F8FAFC;
            }
            .card {
                background: #FFFFFF;
                border-color: #E2E8F0;
            }
            .card .desc { color: #64748B; }
            .form-group input,
            .form-group select {
                background: #F8FAFC;
                border-color: #E2E8F0;
                color: #0F172A;
            }
            .form-group input:focus {
                border-color: var(--gold);
            }
            .form-group label { color: #475569; }
            .demo-info { border-color: rgba(217,119,6,0.1); }
            .demo-info .code { background: #F1F5F9; color: #475569; }
            .footer { border-color: #E2E8F0; color: #94A3B8; }
            .lgpd-check { color: #64748B; }
            .logo .sub { color: #94A3B8; }
            .logo .name .tm { color: #94A3B8; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span class="name">VIGORRE <span class="one">ONE</span><span class="tm">™</span></span>
            <span class="sub">People Intelligence Enterprise</span>
        </div>

        <h1>Bem-vindo 👋</h1>
        <p class="desc">Acesse sua conta para continuar</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <div class="form-group">
                <label for="role">Perfil de Acesso</label>
                <select id="role">
                    <option value="admin">Administrador</option>
                    <option value="organizacao" selected>Organização</option>
                    <option value="participante">Participante</option>
                </select>
            </div>

            <!-- LGPD Consentimento -->
            <div class="lgpd-check">
                <input type="checkbox" id="lgpdConsent" required />
                <label for="lgpdConsent">
                    🔒 Concordo com a <a href="#" onclick="alert('Política de Privacidade VIGORRE ONE™ - Seus dados são protegidos conforme LGPD.')">Política de Privacidade</a> e com o tratamento dos meus dados conforme a LGPD.
                </label>
            </div>

            <div id="error" class="error"></div>
            <div id="success" class="success"></div>

            <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
        </form>

        <div class="demo-info">
            <strong>🔑 Contas de Demonstração:</strong><br />
            <span class="code">admin@vigorre.com</span> · <span class="code">empresa@vigorre.com</span> · <span class="code">participante@vigorre.com</span><br />
            <span style="color:var(--gray-500);">(qualquer senha funciona)</span>
        </div>

        <div class="footer">© 2026 VIGORRE ONE™ · People Analytics Enterprise · <a href="#" style="color:var(--gold);text-decoration:none;" onclick="alert('🔒 LGPD - Política de Privacidade VIGORRE ONE™')">LGPD</a></div>
    </div>

    <script src="/supabase-config.js"></script>
    <script src="/auth.js"></script>
    <script>
        // ============================================
        // HANDLE LOGIN
        // ============================================
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;
            const lgpdConsent = document.getElementById('lgpdConsent').checked;
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            const btn = document.getElementById('loginBtn');

            // Reset messages
            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            // Validar campos
            if (!email || !password) {
                errorEl.textContent = 'Preencha todos os campos.';
                errorEl.classList.add('show');
                return;
            }

            // Validar LGPD
            if (!lgpdConsent) {
                errorEl.textContent = '🔒 Você precisa concordar com a Política de Privacidade (LGPD) para acessar.';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = '🔄 Entrando...';

            try {
                if (window.VigorreAuth) {
                    // Tentar login com consentimento
                    window.VigorreAuth.login(email, password, role, true);
                } else {
                    throw new Error('Sistema de autenticação não disponível.');
                }
            } catch (err) {
                errorEl.textContent = err.message || 'Erro ao fazer login.';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }

        // ============================================
        // REDIRECIONAR SE JÁ LOGADO
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Verificar mensagem na URL
            const urlParams = new URLSearchParams(window.location.search);
            const message = urlParams.get('message');
            if (message) {
                const successEl = document.getElementById('success');
                successEl.textContent = 'ℹ️ ' + decodeURIComponent(message);
                successEl.classList.add('show');
            }

            if (window.VigorreAuth && window.VigorreAuth.isAuthenticated()) {
                const user = window.VigorreAuth.getCurrentUser();
                const redirects = {
                    'admin': '/admin/dashboard.html',
                    'organizacao': '/organizacao/dashboard.html',
                    'participante': '/participante/dashboard.html'
                };
                window.location.href = redirects[user.role] || '/';
            }
        });

        console.log('✅ Página de Login com LGPD carregada com sucesso!');
    </script>
</body>
</html>
