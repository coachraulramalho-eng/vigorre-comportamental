<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Participante | VIGORRE ONE™</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/globals.css" />
  
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0A2540 0%, #1D4ED8 50%, #7C3AED 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
    }
    
    .login-container {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .login-logo .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #06B6D4, #7C3AED);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.25rem;
      color: white;
      font-family: 'Poppins', sans-serif;
    }
    
    .login-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #0A2540;
      margin: 0;
    }
    
    .login-logo .tm {
      font-size: 0.5rem;
      vertical-align: super;
      color: #06B6D4;
    }
    
    .login-subtitle {
      color: #64748B;
      font-size: 0.875rem;
      margin-top: 4px;
    }
    
    .login-form .form-group {
      margin-bottom: 20px;
    }
    
    .login-form label {
      display: block;
      font-weight: 600;
      font-size: 0.875rem;
      color: #0A2540;
      margin-bottom: 6px;
    }
    
    .login-form input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: #F8FAFC;
    }
    
    .login-form input:focus {
      outline: none;
      border-color: #1D4ED8;
      background: white;
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1D4ED8, #7C3AED);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(29, 78, 216, 0.4);
    }
    
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .login-error {
      background: #FEE2E2;
      color: #991B1B;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
      border-left: 4px solid #EF4444;
    }
    
    .login-error.show {
      display: block;
    }
    
    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #E2E8F0;
    }
    
    .login-footer a {
      color: #1D4ED8;
      font-weight: 600;
      text-decoration: none;
    }
    
    .login-footer a:hover {
      color: #7C3AED;
    }
    
    .login-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .back-link {
      display: inline-block;
      margin-top: 12px;
      color: #64748B;
      font-size: 0.875rem;
      text-decoration: none;
    }
    
    .back-link:hover {
      color: #0A2540;
    }
  </style>
</head>
<body>

<div class="login-container">
  
  <div class="login-header">
    <div class="login-logo">
      <div class="logo-icon">V</div>
      <h1>VIGORRE ONE<span class="tm">™</span></h1>
    </div>
    <p class="login-subtitle">Acesse sua área de participante</p>
  </div>
  
  <div id="loginError" class="login-error">
    ⚠️ <span id="errorMessage">Credenciais inválidas</span>
  </div>
  
  <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
    
    <div class="form-group">
      <label for="email">E-mail</label>
      <input 
        type="email" 
        id="email" 
        placeholder="seu@email.com" 
        required 
        autocomplete="email"
        value="participante@teste.com"
      />
    </div>
    
    <div class="form-group">
      <label for="password">Senha</label>
      <input 
        type="password" 
        id="password" 
        placeholder="••••••••" 
        required 
        autocomplete="current-password"
        value="part123"
      />
    </div>
    
    <button type="submit" id="loginBtn" class="btn-login">
      Entrar como Participante
    </button>
    
  </form>
  
  <div class="login-footer">
    <a href="../login.html">← Voltar para o login principal</a>
    <br />
    <a href="../index.html" class="back-link">🏠 Voltar para o site</a>
  </div>
  
</div>

<script src="../supabase-config.js"></script>
<script src="../auth.js"></script>

<script>
'use strict';

document.addEventListener('DOMContentLoaded', function() {
  console.log('🔐 Login do Participante');
  
  if (window.VigorreAuth && window.VigorreAuth.isAuthenticated()) {
    const user = window.VigorreAuth.getCurrentUser();
    if (user && user.role === 'participant') {
      window.location.href = 'dashboard.html';
    }
  }
});

async function handleLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');
  const errorDiv = document.getElementById('loginError');
  const errorMsg = document.getElementById('errorMessage');
  
  if (!email || !password) {
    errorMsg.textContent = 'Preencha todos os campos';
    errorDiv.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span> Entrando...';
  errorDiv.classList.remove('show');
  
  try {
    const user = await window.VigorreAuth.login(email, password);
    
    if (user.role !== 'participant') {
      throw new Error('Esta área é exclusiva para participantes.');
    }
    
    window.location.href = 'dashboard.html';
    
  } catch (error) {
    console.error('❌ Erro:', error);
    errorMsg.textContent = error.message || 'Credenciais inválidas';
    errorDiv.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Entrar como Participante';
  }
}
</script>

</body>
</html>
